<script>
(function(){
  // Hamburger menü — garantili çalışır
  var hb = document.getElementById('HB');
  var mm = document.getElementById('MM');
  if(hb && mm){
    hb.addEventListener('click', function(){
      var isOpen = mm.classList.toggle('open');
      hb.classList.toggle('open', isOpen);
      hb.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    // Menüdeki linklere tıklanınca kapat
    var links = mm.querySelectorAll('a');
    links.forEach(function(link){
      link.addEventListener('click', function(){
        mm.classList.remove('open');
        hb.classList.remove('open');
        hb.setAttribute('aria-expanded', 'false');
      });
    });
  }

  // Scroll reveal
  var els = document.querySelectorAll('.r');
  if('IntersectionObserver' in window){
    var ro = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('on'); ro.unobserve(e.target); }
      });
    },{threshold:0.08,rootMargin:'0px 0px -16px 0px'});
    els.forEach(function(el){ ro.observe(el); });
  } else {
    // Fallback: IE/eski browser
    els.forEach(function(el){ el.classList.add('on'); });
  }

  // Sayaç animasyonu
  var cnts = document.querySelectorAll('.cnt');
  if(cnts.length && 'IntersectionObserver' in window){
    var co = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        var el = e.target;
        var target = parseInt(el.getAttribute('data-t'), 10);
        var step = Math.ceil(target / 60);
        var current = 0;
        var timer = setInterval(function(){
          current += step;
          if(current >= target){ el.textContent = target; clearInterval(timer); }
          else { el.textContent = current; }
        }, 20);
        co.unobserve(el);
      });
    },{threshold:0.5});
    cnts.forEach(function(el){ co.observe(el); });
  } else {
    cnts.forEach(function(el){ el.textContent = el.getAttribute('data-t'); });
  }
})();
</script>
